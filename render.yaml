services:
  # 1. Node.js Backend
  - type: web
    name: aetherlog-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 4000
      - key: PYTHON_SERVICE_URL
        fromService:
          type: pserv
          name: aetherlog-python-service
          property: hostport
      - key: DATABASE_URL
        fromDatabase:
          name: aetherlog-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false # User must set this manually after deploying frontend

  # 2. Python AI Service
  - type: pserv
    name: aetherlog-python-service
    env: docker
    dockerContext: python-service
    dockerfilePath: python-service/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 5000

databases:
  - name: aetherlog-db
    plan: free
    databaseName: ailoganalyzer
    user: admin

version: "1"
